herename: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build
        run: |
          npm install -g cordova
          cordova create myApp com.example.app MyApp
          cd myApp
          rm -rf www/*
          cp ../index.html www/
          cordova platform add android
          # هذا الأمر سيجبر كوردوفا على بناء ملف APK
          cordova build android --release --prod
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: myApp/platforms/android/app/build/outputs/apk/release/*.apk
