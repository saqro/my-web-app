name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Build
        run: |
          npm install -g cordova
          cordova create myApp com.example.app MyApp
          cd myApp
          rm -rf www/*
          cp ../index.html www/
          cordova platform add android
          cordova build android --release -- --apk
          
      - name: List Files
        run: |
          echo "--- جاري البحث عن ملفات الـ APK في المجلد ---"
          find . -name "*.apk"
          echo "--- انتهى البحث ---"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: '**/*.apk'

