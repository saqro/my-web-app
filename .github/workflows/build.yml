name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install Cordova and Android SDK Tools
        run: |
          npm install -g cordova
          # تثبيت الحزم الأساسية لبناء الأندرويد
          sudo apt-get update
          sudo apt-get install -y default-jdk
          
      - name: Build APK
        run: |
          cordova create myApp com.example.app MyApp
          cd myApp
          rm -rf www/*
          cp ../index.html www/
          cordova platform add android
          # البناء بصيغة APK مباشرة
          cordova build android --release -- --apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: final-app
          path: myApp/platforms/android/app/build/outputs/apk/release/*.apk
