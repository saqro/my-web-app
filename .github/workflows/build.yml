name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build with Cordova
        uses: mathieudutour/cordova-build-android@v1
        with:
          # هذا الإجراء سيقوم بكل العمليات المعقدة تلقائياً
          args: --release
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: final-app
          path: platforms/android/app/build/outputs/apk/release/*.apk
